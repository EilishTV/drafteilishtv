<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrar Perfiles | EilishTV</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<link rel="stylesheet" href="../css/profile.css">
</head>
<body>

<div class="profilePage">
  <button class="backBtn" onclick="window.location.href='/browse/'">← Volver a EilishTV</button>
  <h1>Perfiles</h1>

  <div class="profilesContainer" id="profilesContainer">
    <!-- Perfiles renderizados por JS -->
  </div>

  <button id="addProfile" class="addProfileBtn">Agregar perfil</button>
  <p class="note">Agrega hasta 5 perfiles por cuenta.</p>
</div>

<!-- Modal para agregar perfil -->
<div class="modal" id="addProfileModal">
  <div class="modalContent">
    <span class="closeModal">&times;</span>
    <h2>Agrega un perfil</h2>
    <p>Agrega un perfil para otra persona que ve EilishTV.</p>
    <img id="newAvatarPreview" src="../images/avatars/avatar1.jpeg" alt="Avatar" class="avatarPreview">
    <input type="text" id="newProfileName" placeholder="Nombre">
    <input type="text" id="newProfileAvatar" placeholder="URL del avatar">
    <button id="saveNewProfile">Guardar</button>
  </div>
</div>

<script type="module" src="../js/profile.js"></script>
</body>
</html>
