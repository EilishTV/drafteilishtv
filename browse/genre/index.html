<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sección</title>
<link rel="stylesheet" href="../browse.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>



<body>

<h2 id="tituloGenero" style="margin-left:20px; color:white;"></h2>

<div class="genreGrid" id="genreGrid"></div>

<script>
const url = "https://opensheet.elk.sh/1PjRQDpbZQ6nscdRzlEOtwNpeEiyeEOGjkic6mggNEBY/1";

// Tomar la sección de la URL
const params = new URLSearchParams(window.location.search);
const seccion = params.get("seccion");

// Elemento del título
const tituloElemento = document.getElementById("tituloGenero");

// Traer los datos del Sheet
fetch(url)
  .then(r => r.json())
  .then(data => {

    const grid = document.getElementById("genreGrid");
    if (!grid) return;

    // Filtrar por sección (ignorando mayúsculas/minúsculas y espacios)
    const filtrados = data
      .map((it, idx) => ({ ...it, _idx: idx }))
      .filter(x =>
        x.seccion &&
        seccion &&
        x.seccion.trim().toLowerCase() === seccion.trim().toLowerCase()
      );

    if (!filtrados.length) {
      grid.innerHTML = "<p style='color:white;'>No hay contenido en esta sección.</p>";
      return;
    }

    // 🔥 Título usando tituloSeccion
    const titulo = filtrados[0].tituloSeccion && filtrados[0].tituloSeccion.trim() !== ""
      ? filtrados[0].tituloSeccion
      : seccion;

    if (tituloElemento) tituloElemento.textContent = titulo;

    // Generar cada tarjeta
    filtrados.forEach(item => {

      const div = document.createElement("div");
      div.className = "genreItem";

      // Usar el fixImagePath del script.js
      let imgPath = item.imagen || "";

      if (imgPath.startsWith("http")) {
        // externa → usar tal cual
      } else {
        imgPath = imgPath.replace(/^\/+/, "");  // limpiar / inicial
        imgPath = "../../" + imgPath;           // subir dos niveles para /images/
      }

      div.innerHTML = `
        <a href="../video.html?id=${item._idx}">
          <img src="${imgPath}" alt="">
        </a>
      `;

      grid.appendChild(div);
    });

  })
  .catch(err => {
    console.error("Error al cargar el sheet:", err);
  });
</script>

<style>

body {
  background: #040714;
  font-family: Arial, sans-serif;
}

.genreGrid {
    margin-top: 30px;
    padding: 0 20px 40px;
    display: grid;
    gap: 16px;
    grid-template-columns: repeat(5, 1fr);
}

.genreItem {
    position: relative;
    aspect-ratio: 16 / 9;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    border: 3px solid rgba(249, 249, 249, 0.1);
    box-shadow: rgb(0 0 0 / 69%) 0px 26px 30px -10px,
                rgb(0 0 0 / 73%) 0px 16px 10px -10px;
    transition: 0.3s ease;
}

.genreItem img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.genreItem:hover {
    transform: scale(1.05);
    border-color: rgba(249, 249, 249, 0.8);
}

@media (max-width: 1024px) {
    .genreGrid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 600px) {
    .genreGrid { grid-template-columns: repeat(2, 1fr); }
}

</style>

</body>
</html>
